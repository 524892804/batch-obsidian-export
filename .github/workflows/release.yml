name: Release

on:
  push:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    - name: Install dependencies
      run: npm install
    - name: Build XPI
      run: npm run build
    - name: Release
      run: npm run release
      env:
        GITHUB_TOKEN: ${{ github.token }}
